name: RSS Feed Güncelle

on:
#  schedule:
#    - cron: "0 * * * *"   # Her saat başı
#  workflow_dispatch:        # Elle de tetiklenebilir

jobs:
  update-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install requests beautifulsoup4 feedgen

      - name: RSS üret
        run: python scraper.py

      - name: Değişiklikleri kaydet ve gönder
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/
          git diff --cached --quiet || git commit -m "RSS güncellendi: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
